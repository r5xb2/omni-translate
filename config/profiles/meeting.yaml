id: meeting
name: 會議優先
provider: groq
sttMode: standard
modelSettings:
  sttModel: whisper-large-v3-turbo
  llmModel: openai/gpt-oss-120b
realtimeModel: gpt-realtime-whisper
vad:
  silenceMs: 600
  maxDurationMs: 25000
